<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial, Helvetica, sans-serif;">

<script>
(() => {
    function applyTgIdToForms(userId) {
        if (!userId) return;
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('form').forEach(form => {
                if (!form.querySelector('input[name="tg_id"]')) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'tg_id';
                    input.value = userId;
                    form.appendChild(input);
                }
            });
        });
    }

    function initTelegramWebApp() {
        try {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;
            tg.ready();
            applyTgIdToForms(tg.initDataUnsafe?.user?.id);
        } catch (e) {}
    }

    if (window.Telegram?.WebApp) {
        initTelegramWebApp();
        return;
    }

    const tgScript = document.createElement('script');
    tgScript.src = 'https://telegram.org/js/telegram-web-app.js';
    tgScript.async = true;
    tgScript.defer = true;
    tgScript.onload = initTelegramWebApp;
    document.head.appendChild(tgScript);
})();
</script>

<h1 style="text-align: center;">Заказ</h1>

<div style="max-width: 800px; margin: auto;">

<form id="orderForm" action="/place_order" method="post" style="text-align: center;">

<label>Дата доставки:</label><br>
<input type="date" name="order_for" required><br><br>

<label>Магазин:</label><br>
<input type="text" name="store_name"><br><br>

<div class="grid">
{% for category in grouped_items %}
<details style="margin-bottom:10px;">
    <summary><b>{{ category["name"] }}</b></summary>

    {% for item in category["items"] %}
    <div style="display:flex; justify-content:space-between; margin:5px 0;">
        <span>{{ item.name }}</span>

        <div>
            <button type="button" class="quantity-minus" data-id="{{ item.id }}">-</button>
            <input type="number" id="quantity-{{ item.id }}" data-id="{{ item.id }}" value="0" style="width:50px;">
            <button type="button" class="quantity-plus" data-id="{{ item.id }}">+</button>
        </div>
    </div>
    {% endfor %}
</details>
{% endfor %}
</div>

<hr>

<!-- FIXED CART -->
<ul class="items-list" style="list-style: none; padding: 0;"></ul>

<br>
<button type="submit">Создать заявку</button>

</form>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

const orderList = document.querySelector('.items-list');

function sendUpdate(id, qty) {
    fetch('/add-to-cart', {
        method: 'POST',
        body: new URLSearchParams({
            itemid: id,
            quantity: qty
        })
    })
    .then(r => r.json())
    .then(data => renderOrder(data.cart, data.items_data));
}

function renderOrder(cart, items) {
    orderList.innerHTML = '';

    for (const id in cart) {
        const qty = cart[id];
        if (qty <= 0) continue;

        const item = items.find(i => String(i.id) === id);
        if (!item) continue;

        const li = document.createElement('li');

        li.style.display = 'flex';
        li.style.justifyContent = 'space-between';
        li.style.alignItems = 'center';
        li.style.padding = '6px 0';
        li.style.borderBottom = '1px solid #eee';

        li.innerHTML = `
            <span>${item.name} - <b>${qty}</b></span>
            <div>
                <button class="minus">-</button>
                <button class="plus">+</button>
                <button class="delete" style="color:red;">Удалить</button>
            </div>
        `;

        li.querySelector('.minus').onclick = () => sendUpdate(id, qty - 1);
        li.querySelector('.plus').onclick = () => sendUpdate(id, qty + 1);
        li.querySelector('.delete').onclick = () => sendUpdate(id, 0);

        orderList.appendChild(li);
    }

    if (!orderList.innerHTML) {
        orderList.innerHTML = '<li style="color:#999;">Корзина пуста</li>';
    }
}

// buttons in catalog
document.querySelectorAll('.quantity-plus').forEach(btn => {
    btn.onclick = () => {
        const id = btn.dataset.id;
        const input = document.getElementById('quantity-' + id);
        const val = parseInt(input.value) + 1;
        input.value = val;
        sendUpdate(id, val);
    };
});

document.querySelectorAll('.quantity-minus').forEach(btn => {
    btn.onclick = () => {
        const id = btn.dataset.id;
        const input = document.getElementById('quantity-' + id);
        const val = Math.max(0, parseInt(input.value) - 1);
        input.value = val;
        sendUpdate(id, val);
    };
});

});
</script>

</body>
</html>
