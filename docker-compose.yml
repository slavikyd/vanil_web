services:
  redis:
    image: redis

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    depends_on:
      - db
      - rabbitmq
    env_file:
      - .env

  # frontend:
  #   image: node:20-alpine
  #   working_dir: /app
  #   command: npm run dev
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - web
  #   environment:
  #     - VITE_API_URL=http://web:8000


  nginx:
    image: nginx:alpine
    container_name: nginx_ssl_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/certs:ro
    depends_on:
      - web
      # - frontend

  migrate:
    build:
      context: .
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DB_URL_MIGRATIONS}
    command: >
      poetry run yoyo apply --batch --database ${DB_URL_MIGRATIONS} migrations

volumes:
  db_data:
