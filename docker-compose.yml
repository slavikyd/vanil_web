services:
  redis:
    image: redis

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # rabbitmq:
  #   image: rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    depends_on:
      - db
      # - rabbitmq
    env_file:
      - .env

  admin:
    build: .
    working_dir: /code/admin_vanil_test
    volumes:
      - .:/code
    depends_on:
      - db
      - web

    env_file:
      - .env
    expose:
      - "8001"
    command:
      - sh
      - -c
      - |
        set -e
        poetry run python manage.py migrate --fake-initial --noinput
        exec poetry run python manage.py runserver 0.0.0.0:8001



  nginx:
    image: nginx:alpine
    container_name: nginx_ssl_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/certs:ro
    depends_on:
      - web
      - admin
      # - frontend

  migrate:
    build:
      context: .
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DB_URL_MIGRATIONS}
    command: >
      poetry run yoyo apply --batch --database ${DB_URL_MIGRATIONS} migrations
  
  loki:
    image: grafana/loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana
    environment:
      - GF_SERVER_ROOT_URL=https://xn--90aioe3a8b4a.xn--p1ai/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    expose:
      - "3000"

volumes:
  db_data:
  loki_data:
  grafana_data:

